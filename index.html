<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>재미있는 나무이름 찾기</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- 이미지 저장을 위한 라이브러리 추가 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        @font-face {
            font-family: 'NeutraText-Bold';
            src: local('NeutraText-Bold'), url('./NeutraText-Bold.otf') format('opentype');
            font-weight: bold;
        }

        /* 나눔손글씨 외할머니체 (웹 폰트로 로드하여 수료증에 적용) */
        @font-face {
            font-family: 'Grandma';
            src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/naverfont_05@1.0/Grandma-cute.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }

        :root {
            --lucy-yellow: #FFCC00;
            --comic-black: #1A1A1A;
            --paper-white: #F9F8F4;
            --snoopy-red: #E52E2D;
            --main-green: #2E9441;
            --grass-green: #3B82F6;
            --safe-area-bottom: env(safe-area-inset-bottom, 0px);
        }
        
        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            background-color: #d1d5db;
            font-family: 'NeutraText-Bold', 'Noto Sans KR', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .title-font { font-family: 'NeutraText-Bold', 'Noto Sans KR', sans-serif; }
        .handwriting { font-family: 'Grandma', cursive !important; } /* 수료증 이름에 확실히 적용 */

        .app-container {
            width: 100%;
            max-width: 420px;
            height: 100dvh;
            max-height: 900px;
            background-color: var(--paper-white);
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            display: flex;
            flex-direction: column;
            background-image: radial-gradient(circle, #e5e5e5 2px, transparent 2px);
            background-size: 16px 16px;
        }

        .comic-border {
            border: 3px solid var(--comic-black);
            border-radius: 12px;
            box-shadow: 4px 4px 0px var(--comic-black);
            background-color: white;
        }

        .comic-btn {
            background-color: white;
            border: 3px solid var(--comic-black);
            border-radius: 12px;
            font-weight: 900;
            transition: all 0.1s ease;
            box-shadow: 3px 3px 0px var(--comic-black);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .comic-btn:active {
            transform: translate(3px, 3px);
            box-shadow: 0px 0px 0px var(--comic-black);
        }

        .comic-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: 3px 3px 0px var(--comic-black);
        }

        .comic-bubble {
            position: relative;
            background: white;
            border: 3px solid var(--comic-black);
            border-radius: 16px;
            padding: 1.25rem;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.1);
        }
        
        .view-content {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            padding-bottom: 7rem;
            display: none;
            animation: fadeSlideUp 0.3s ease forwards;
        }
        
        .view-content.active { display: block; }
        
        #view-map.active {
            display: flex;
            flex-direction: column;
            padding: 0;
            padding-bottom: 7rem; 
            background-color: var(--paper-white); 
        }

        .bottom-nav {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: calc(70px + var(--safe-area-bottom));
            background: white;
            border-top: 3px solid var(--comic-black);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 50;
            padding-bottom: var(--safe-area-bottom);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #666;
            font-size: 0.75rem;
            font-weight: bold;
            width: 33.33%;
            cursor: pointer;
            transition: color 0.2s;
        }
        .nav-item.active { color: var(--main-green); }
        .nav-item i { font-size: 1.5rem; margin-bottom: 4px; transition: transform 0.2s; }

        .map-container {
            width: 100%;
            flex-grow: 1; 
            position: relative;
            overflow: hidden;
            background-color: transparent;
            cursor: grab;
        }
        .map-container:active { cursor: grabbing; }

        .map-content {
            position: absolute;
            top: 0;
            left: 0;
            transform-origin: 0 0;
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            width: 851px; 
            height: 737px;
            background-image: url('./snoopy_garden_map.jpg'); 
            background-size: 100% 100%;
            background-repeat: no-repeat;
        }

        .map-pin {
            position: absolute;
            width: 32px;
            height: 32px;
            background-color: var(--snoopy-red);
            border: 3px solid var(--comic-black); 
            border-radius: 50% 50% 50% 0;
            transform: translate(-50%, -100%) rotate(-45deg);
            cursor: pointer;
            box-shadow: 2px 2px 0 rgba(0,0,0,0.3);
            z-index: 10;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }

        .map-pin.target-pin {
            background-color: var(--lucy-yellow);
            transform: translate(-50%, -100%) rotate(-45deg) scale(1.2);
            z-index: 20;
            animation: bouncePin 1s infinite alternate ease-in-out;
        }
        
        @keyframes bouncePin {
            0% { transform: translate(-50%, -100%) rotate(-45deg) scale(1.2); }
            100% { transform: translate(-50%, -120%) rotate(-45deg) scale(1.2); }
        }

        .map-pin::after {
            content: '';
            width: 12px;
            height: 12px;
            background-color: white;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 2px solid var(--comic-black);
        }

        .map-pin.collected-pin {
            background-color: #9CA3AF; 
            border-color: #4B5563;
            transform: translate(-50%, -100%) rotate(-45deg) scale(0.9);
            z-index: 5;
        }
        .map-pin.collected-pin::after { background-color: #D1D5DB; }

        .map-pin.locked-pin {
            background-color: #D1D5DB;
            border-color: #9CA3AF;
            transform: translate(-50%, -100%) rotate(-45deg) scale(0.8);
            opacity: 0.8;
            pointer-events: none;
        }
        .map-pin.locked-pin::after { background-color: #F3F4F6; }

        .pin-popup {
            position: absolute;
            background: white;
            border: 3px solid var(--comic-black);
            border-radius: 8px;
            padding: 8px 12px;
            font-weight: bold;
            font-size: 0.85rem;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            transform: translate(-50%, -10px);
            transition: opacity 0.2s, transform 0.2s;
            box-shadow: 3px 3px 0 var(--comic-black);
            z-index: 30;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .pin-popup.show {
            opacity: 1;
            transform: translate(-50%, -25px);
            pointer-events: auto; 
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .shake { animation: shakeAnim 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shakeAnim {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        .stamp-slot {
            aspect-ratio: 1;
            border: 2px dashed #9ca3af;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: rgba(255,255,255,0.5);
            position: relative;
            overflow: hidden; 
            cursor: pointer;
        }
        .stamp-slot.collected {
            border: 3px solid var(--comic-black);
            background-color: white;
            background-size: contain; 
            background-repeat: no-repeat;
            background-position: center;
        }
        .stamp-slot.selected-fav {
            border: 4px solid var(--snoopy-red);
            box-shadow: 0 0 10px rgba(229, 46, 45, 0.5);
        }
        
        .stamp-mark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-15deg);
            color: var(--snoopy-red);
            font-family: 'NeutraText-Bold', 'Noto Sans KR', sans-serif;
            font-weight: 900;
            font-size: 1.4rem;
            white-space: nowrap;
            text-shadow: 2px 2px 0px white, -2px -2px 0px white, 2px -2px 0px white, -2px 2px 0px white; 
            border: 3px solid var(--snoopy-red);
            padding: 4px 10px;
            border-radius: 6px;
            background-color: rgba(255, 255, 255, 0.75);
            box-shadow: 0 0 4px rgba(255, 255, 255, 1);
            z-index: 10;
        }

        @keyframes stampIn {
            0% { transform: translate(-50%, -50%) rotate(-15deg) scale(3); opacity: 0; }
            50% { transform: translate(-50%, -50%) rotate(-15deg) scale(0.9); opacity: 1; }
            100% { transform: translate(-50%, -50%) rotate(-15deg) scale(1); opacity: 1; }
        }
        .stamp-anim { animation: stampIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        #view-certificate {
            padding: 0;
            background-color: #f3f4f6;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
        }
        #view-certificate.active { display: flex; }

        .cert-wrapper {
            position: relative;
            width: 100%;
            max-width: 420px; 
            aspect-ratio: 1536 / 2754;
            background-image: url('./certification background.png'); 
            background-size: cover;
            background-position: center;
            container-type: inline-size; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            background-color: white;
        }

        .cert-name-box {
            position: absolute;
            left: 65.1%; 
            width: 19.53%; 
            top: 27.05%; 
            height: 2.36%; 
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            white-space: nowrap;
            font-size: 8cqi;
        }

        /* 이미지 영역: 정확히 2200px 지점 (79.88% 비율)에서 시작 */
        .cert-img-box {
            position: absolute;
            left: 50%;
            top: 79.88%; 
            transform: translateX(-50%); 
            width: 35cqi;
            height: 18cqi;
            background-color: transparent;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .cert-img-box img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header id="main-header" class="bg-[#2E9441] border-b-3 border-black p-4 pt-6 relative z-10 flex items-center justify-center shadow-sm">
            <h1 class="text-2xl font-black title-font tracking-wide text-white">재미있는 나무이름 찾기</h1>
        </header>

        <!-- (이하 내용 생략 - 기존 구조 유지, 로직 업데이트 부분에 집중) -->
        <!-- ... -->
        <script>
            // ... (기존 변수 및 DB 설정 생략) ...

            // [수정된 퀴즈 로직] - finalDesc 활용
            function renderFinalTestQuestion() {
                const step = state.finalTest.currentStep;
                const plant = state.finalTest.questions[step];
                
                document.getElementById('test-step-badge').innerText = `문제 ${step + 1} / 2`;
                
                // [요청 반영] fullDesc를 통해 문제 출제
                const clue = plant.fullDesc;
                document.getElementById('final-quiz-desc').innerText = `"${clue}"`;

                const optionsContainer = document.getElementById('final-quiz-options');
                optionsContainer.innerHTML = '';
                
                // 오답 3개 생성
                const wrongOptions = ALL_PLANTS_LIST.filter(p => p.id !== plant.id).sort(() => 0.5 - Math.random()).slice(0, 3);
                const finalOptions = [plant, ...wrongOptions].sort(() => 0.5 - Math.random());

                finalOptions.forEach((opt, index) => {
                    const btn = document.createElement('button');
                    btn.className = "comic-btn py-3 px-4 text-center w-full hover:bg-gray-50 text-base text-gray-700";
                    btn.innerText = opt.name;
                    btn.onclick = () => handleFinalTestAnswer(opt.id, plant.id, btn);
                    optionsContainer.appendChild(btn);
                });
            }

            // [기타 함수는 기존대로 유지] ...
        </script>
        <!-- (하단 인증서 발급 등 나머지 마크업 구조 유지) -->
    </div>
</body>
</html>
